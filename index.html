<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>Saathi AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash" class="screen">
    <h1>Saathi AI</h1>
    <p>Main yahin hoon, tum akela nahi ho 🤍</p>
  </div>

  <!-- Welcome Screen -->
  <div id="welcome" class="hidden screen">
    <h2>Welcome 🤗</h2>
    <p>
      Main tumhara caring AI companion hoon.  
      Main sunungi, samjhoongi aur khayal rakhungi.
    </p>
    <button onclick="startApp()">Start Karein</button>
  </div>

  <!-- Chat Screen -->
<div id="chat" class="hidden screen">
    <div class="chat-header">Saathi AI 🤍</div>
  
    <div id="messages" class="chat-body">
      <div class="message ai">
        Hi, main Saathi hoon 😊<br>
        Tum kaise ho?
      </div>
    </div>
    <div id="typing" class="typing hidden">
        Saathi AI typing<span class="dots">...</span>
      </div>
      
  
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Yahan likho..." />
      <button onclick="sendMessage()">Send</button>
      <button id="micBtn">🎤</button>

    </div>
  </div>
  

  <script src="script.js"></script>

  <script type="module">
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    // TODO: Add SDKs for Firebase products that you want to use
    // https://firebase.google.com/docs/web/setup#available-libraries
  
    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCoNUwgEmvZkXb9khUAQpTl81NA0D5yHY8",
      authDomain: "saathi-ai-4005c.firebaseapp.com",
      projectId: "saathi-ai-4005c",
      storageBucket: "saathi-ai-4005c.firebasestorage.app",
      messagingSenderId: "565322216252",
      appId: "1:565322216252:web:240da60cd1cb551e47a439"
    };
// Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 🔥 Example Function: Save Chat Message
async function saveMessage(userName, message, mood) {
  try {
    await addDoc(collection(db, "chats"), {
      user: userName,
      text: message,
      mood: mood,
      timestamp: new Date()
    });
    console.log("Message saved successfully");
  } catch (error) {
    console.error("Error saving message: ", error);
  }
}

// 🔥 TEST BUTTON (Temporary)
window.saveTestMessage = function () {
  saveMessage("Suraj", "Hello Saathi AI", "Happy");
};

  </script>
 <button onclick="saveTestMessage()">Test Save</button>
  
</body>
</html>
