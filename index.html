<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>Saathi AI</title>
  <link rel="stylesheet" href="style.css">
  
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash" class="screen">
    <h1>Saathi AI</h1>
    <p>Main yahin hoon, tum akela nahi ho 🤍</p>
  </div>

  <!-- Welcome Screen -->
  <div id="welcome" class="hidden screen">
    <h2>Welcome 🤗</h2>
    <p>
      Main tumhara caring AI companion hoon.  
      Main sunungi, samjhoongi aur khayal rakhungi.
    </p>
    <button onclick="startApp()">Start Karein</button>
  </div>

  <!-- Chat Screen -->
<div id="chat" class="hidden screen">
    <div class="chat-header">Saathi AI 🤍</div>
  
    <div id="messages" class="chat-body">
      <div class="message ai">
        Hi, main Saathi hoon 😊<br>
        Tum kaise ho?
      </div>
    </div>
    <div id="typing" class="typing hidden">
        Saathi AI typing<span class="dots">...</span>
      </div>
      
  
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Yahan likho..." />
      <button onclick="sendMessage()">Send</button>
      <button id="micBtn">🎤</button>

    </div>
  </div>
  <header>
    <h1>Saathi AI</h1>
    <p>Your Smart Companion</p>
  </header>
  
  <div class="chat-container">
    <div id="chat-box"></div>
  
    <div class="input-area">
      <input type="text" id="user-input" placeholder="Type your message..." />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script src="script.js"></script>
<button id="testBtn">Test Save</button>
  <script type="module">
   import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyCoNUwgEmvZkXb9khUAQpTl81NA0D5yHY8",
      authDomain: "saathi-ai-4005c.firebaseapp.com",
      projectId: "saathi-ai-4005c",
      storageBucket: "saathi-ai-4005c.firebasestorage.app",
      messagingSenderId: "565322216252",
      appId: "1:565322216252:web:240da60cd1cb551e47a439"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    document.addEventListener("DOMContentLoaded", () => {
    
      const btn = document.getElementById("testBtn");
    
      if (btn) {
        btn.addEventListener("click", async () => {
          await addDoc(collection(db, "chats"), {
            user: "Suraj",
            text: "Hello Saathi AI",
            mood: "Happy",
            timestamp: new Date()
          });
          console.log("Saved successfully");
          alert("Data Saved ✅");
        });
      }
    });
    </script>
</body>
</html>
